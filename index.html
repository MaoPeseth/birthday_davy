<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday DAVY</title>

<style>
    body {
        margin: 0;
        padding: 15px;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background: linear-gradient(120deg, #ff9a9e, #fad0c4);
        text-align: center;
        color: white;
    }

    /* Title */
    h1 {
        margin-top: 60px;
        font-size: 36px;
        animation: glow 2s infinite alternate;
    }

    @keyframes glow {
        from { text-shadow: 0 0 10px white; }
        to { text-shadow: 0 0 30px #ff00de; }
    }

    /* Message */
    p {
        font-size: 18px;
        width: 90%;
        margin: 20px auto;
        line-height: 1.6;
    }

    /* Button */
    button {
        margin-top: 25px;
        padding: 14px 24px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        background: #ff4081;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #e91e63;
    }

    /* Balloons */
    .balloon {
        position: absolute;
        bottom: -100px;
        width: 40px;
        height: 60px;
        border-radius: 50%;
        animation: float 10s infinite;
    }

    @keyframes float {
        from { transform: translateY(0); }
        to { transform: translateY(-120vh); }
    }

    /* Confetti */
    .confetti {
        position: absolute;
        width: 8px;
        height: 8px;
        top: 0;
        animation: fall 5s infinite;
    }

    @keyframes fall {
        from { transform: translateY(0); }
        to { transform: translateY(100vh); }
    }

    /* For bigger screens */
    @media (min-width: 768px) {
        h1 {
            font-size: 60px;
        }
        p {
            font-size: 24px;
            width: 60%;
        }
        button {
            font-size: 20px;
        }
    }
</style>
</head>

<body>

<h1>🎉 Happy Birthday DAVY 🎂</h1>

<p id="message">
Click the button to see your birthday message 💌
</p>

<button onclick="showMessage()">Click Here</button>

<script>
function showMessage() {
    document.getElementById("message").innerHTML =
    "Dear DAVY, Happy Birthday! 🎂 I wish you happiness, good health, success in your study and life. May your smile always be bright and your dreams come true. Enjoy your special day! 💖";
}

/* Create balloons */
for(let i=0;i<10;i++){
    let balloon = document.createElement("div");
    balloon.className = "balloon";
    balloon.style.left = Math.random()*100 + "vw";
    balloon.style.background = 
        ["red","blue","yellow","green","purple"][Math.floor(Math.random()*5)];
    balloon.style.animationDuration = (5 + Math.random()*5) + "s";
    document.body.appendChild(balloon);
}

/* Create confetti */
for(let i=0;i<50;i++){
    let confetti = document.createElement("div");
    confetti.className = "confetti";
    confetti.style.left = Math.random()*100 + "vw";
    confetti.style.background = 
        ["red","blue","yellow","green","purple","pink"][Math.floor(Math.random()*6)];
    confetti.style.animationDuration = (3 + Math.random()*3) + "s";
    document.body.appendChild(confetti);
}
</script>

</body>
</html>
