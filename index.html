<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday DAVY</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass: rgba(255, 255, 255, 0.15);
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0c29;
            background: linear-gradient(to bottom, #24243e, #302b63, #0f0c29);
            overflow: hidden;
            color: white;
        }

        /* Responsive Card Container */
        .card {
            position: relative;
            z-index: 10;
            width: 85%; /* Mobile width */
            max-width: 500px; /* Desktop max width */
            padding: 40px 20px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
            transition: transform 0.3s ease;
        }

        /* Computer Hover Effect */
        @media (min-width: 768px) {
            .card:hover {
                transform: translateY(-10px);
                background: rgba(255, 255, 255, 0.2);
            }
        }

        h1 {
            font-size: clamp(2rem, 8vw, 3.5rem); /* Fluid typography */
            margin-bottom: 20px;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
        }

        p {
            font-size: clamp(1rem, 4vw, 1.25rem);
            line-height: 1.6;
            margin-bottom: 30px;
            font-weight: 300;
        }

        button {
            background: #ff4081;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 64, 129, 0.3);
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        button:active {
            transform: scale(0.9);
        }

        /* Background Decorations */
        .ornament {
            position: absolute;
            pointer-events: none;
            animation: drift var(--d) linear infinite;
            opacity: 0.6;
        }

        @keyframes drift {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-20vh) rotate(360deg); }
        }

    </style>
</head>
<body>

    <div class="card">
        <h1 id="title">HBD DAVY!</h1>
        <p id="message">A special message is waiting for you...</p>
        <button id="mainBtn" onclick="celebrate()">🎁 Open Gift</button>
    </div>

<script>
    function celebrate() {
        const title = document.getElementById('title');
        const msg = document.getElementById('message');
        const btn = document.getElementById('mainBtn');

        title.innerHTML = "🎉 Happy Birthday! 🎂";
        msg.innerHTML = "Dear <b>DAVY</b>, wishing you a day filled with love and a year filled with joy. May all your dreams come true! 💖";
        btn.style.display = "none";

        // Intense celebration burst
        for(let i=0; i<50; i++) {
            spawnOrnament(true); 
        }
    }

    function spawnOrnament(isBurst = false) {
        const emojis = ['✨', '🎈', '🎂', '🎉', '💖', '⭐'];
        const el = document.createElement('div');
        el.className = 'ornament';
        el.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
        
        const left = Math.random() * 100;
        const size = Math.random() * 20 + 20;
        const duration = isBurst ? (Math.random() * 3 + 2) : (Math.random() * 5 + 7);
        
        el.style.left = left + 'vw';
        el.style.fontSize = size + 'px';
        el.style.setProperty('--d', duration + 's');
        
        if (isBurst) {
            el.style.bottom = '-10vh';
        } else {
            el.style.bottom = '-20vh';
        }

        document.body.appendChild(el);
        
        setTimeout(() => {
            el.remove();
        }, duration * 1000);
    }

    // Continuous background elements
    setInterval(() => spawnOrnament(false), 800);
</script>

</body>
</html>
