<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday DAVY</title>
    <style>
        :root {
            --primary: #ff4081;
            --secondary: #7c4dff;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        /* Container for iPhone Responsiveness */
        .container {
            z-index: 10;
            width: 90%;
            max-width: 400px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            margin: 0 0 20px 0;
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #fff;
            margin-bottom: 25px;
            transition: all 0.5s ease;
        }

        button {
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 64, 129, 0.4);
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        button:active {
            transform: scale(0.95);
            background: #e91e63;
        }

        /* Floating Elements */
        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            bottom: -50px;
            animation: floatUp var(--duration) linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        /* Confetti Burst */
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            z-index: 5;
            top: -10px;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(720deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="title">🎉 DAVY 🎂</h1>
    <p id="message">Tap the button to unlock a special surprise 💌</p>
    <button id="btn" onclick="reveal()">Open Message</button>
</div>

<script>
    function reveal() {
        const msg = document.getElementById("message");
        const btn = document.getElementById("btn");
        const title = document.getElementById("title");

        title.innerHTML = "✨ Happy Birthday! ✨";
        msg.innerHTML = "Dear <b>DAVY</b>,<br><br>I wish you endless happiness, radiant health, and massive success in your studies and life. May your smile always stay bright! 💖";
        msg.style.color = "#fff";
        btn.style.display = "none";

        // Create initial burst of confetti
        for(let i=0; i<100; i++) {
            createConfetti();
        }
    }

    function createParticle() {
        const particles = ['🎈', '💖', '⭐', '🌸', '✨'];
        const p = document.createElement("div");
        p.className = "particle";
        p.innerHTML = particles[Math.floor(Math.random() * particles.length)];
        p.style.left = Math.random() * 100 + "vw";
        p.style.fontSize = (Math.random() * 20 + 15) + "px";
        const duration = (Math.random() * 5 + 5);
        p.style.setProperty('--duration', duration + "s");
        p.style.opacity = Math.random();
        
        document.body.appendChild(p);
        
        setTimeout(() => p.remove(), duration * 1000);
    }

    function createConfetti() {
        const c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.background = ["#ff4081", "#7c4dff", "#ffeb3b", "#4caf50", "#03a9f4"][Math.floor(Math.random()*5)];
        c.style.width = Math.random() * 10 + 5 + "px";
        c.style.height = c.style.width;
        c.style.animationDuration = (Math.random() * 3 + 2) + "s";
        c.style.borderRadius = Math.random() > 0.5 ? "50%" : "0";
        
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 5000);
    }

    // Background floating animation
    setInterval(createParticle, 600);
</script>

</body>
</html>
